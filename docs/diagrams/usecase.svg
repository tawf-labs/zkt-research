ext fill="#000000" font-family="Times-Roman" font-size="31.25" lengthAdjust="spacing" textLength="536.3464" x="59.8437" y="764.0089">creates campaign with milestones</text></g><!--entity S4--><g class="entity" data-qualified-name="S4" data-source-line="12" id="ent0005"><rect fill="#F1F1F1" height="135.2539" rx="7.8125" ry="7.8125" style="stroke:#181818;stroke-width:4.6875;" width="536.7126" x="59.6563" y="990.125"/><text fill="#000000" font-family="Times-Roman" font-size="31.25" lengthAdjust="spacing" textLength="474.2126" x="90.9063" y="1050.382">4. submitForCommunityVote()</text><text fill="#000000" font-family="Times-Roman" font-size="31.25" lengthAdjust="spacing" textLength="304.3976" x="90.9063" y="1086.7589">opens tiered voting</text></g><!--entity S5--><g class="entity" data-qualified-name="S5" data-source-line="13" id="ent0006"><rect fill="#F1F1F1" height="135.2539" rx="7.8125" ry="7.8125" style="stroke:#181818;stroke-width:4.6875;" width="612.2589" x="21.875" y="1312.875"/><text fill="#000000" font-family="Times-Roman" font-size="31.25" lengthAdjust="spacing" textLength="428.6041" x="53.125" y="1373.132">5. finalizeCommunityVote()</text><text fill="#000000" font-family="Times-Roman" font-size="31.25" lengthAdjust="spacing" textLength="549.7589" x="53.125" y="1409.5089">tallies votes, triggers sharia review</text></g><!--entity S6--><g class="entity" data-qualified-name="S6" data-source-line="14" id="ent0007"><rect fill="#F1F1F1" height="135.2539" rx="7.8125" ry="7.8125" style="stroke:#181818;stroke-width:4.6875;" width="519.3481" x="68.3437" y="1635.6563"/><text fill="#000000" font-family="Times-Roman" font-size="31.25" lengthAdjust="spacing" textLength="302.0477" x="99.5937" y="1695.9132">6. reviewProposal()</text><text fill="#000000" font-family="Times-Roman" font-size="31.25" lengthAdjust="spacing" textLength="456.8481" x="99.5937" y="1732.2902">Groth16 ZK proof submission</text></g><!--entity S7--><g class="entity" data-qualified-name="S7" data-source-line="15" id="ent0008"><rect fill="#F1F1F1" height="135.2539" rx="7.8125" ry="7.8125" style="stroke:#181818;stroke-width:4.6875;" width="530.1208" x="62.9375" y="1958.4062"/><text fill="#000000" font-family="Times-Roman" font-size="31.25" lengthAdjust="spacing" textLength="388.504" x="94.1875" y="2018.6632">7. createCampaignPool()</text><text fill="#000000" font-family="Times-Roman" font-size="31.25" lengthAdjust="spacing" textLength="467.6208" x="94.1875" y="2055.0402">initializes campaign fund pool</text></g><!--entity S8--><g class="entity" data-qualified-name="S8" data-source-line="16" id="ent0009"><rect fill="#F1F1F1" height="171.6309" rx="7.8125" ry="7.8125" style="stroke:#181818;stroke-width:4.6875;" width="593.4906" x="31.25" y="2281.1563"/><text fill="#000000" font-family="Times-Roman" font-size="31.25" lengthAdjust="spacing" textLength="530.9906" x="62.5" y="2341.4132">8. donateZK() / donateZKPrivate()</text><text fill="#000000" font-family="Times-Roman" font-size="31.25" lengthAdjust="spacing" textLength="432.2968" x="62.5" y="2377.7902">verifies proof, routes funds,</text><text fill="#000000" font-family="Times-Roman" font-size="31.25" lengthAdjust="spacing" textLength="276.947" x="62.5" y="2414.1671">mints SBT receipt</text></g><!--link S1 to S2--><g class="link" data-entity-1="ent0002" data-entity-2="ent0003" data-link-type="dependency" data-source-line="18" id="lnk10"><path d="M328,158.2188 C328,212.5312 328,270.5938 328,324.875" fill="none" id="S1-to-S2" style="stroke:#181818;stroke-width:3.125;"/><polygon fill="#181818" points="328,343.625,340.5,315.5,328,328,315.5,315.5,328,343.625" style="stroke:#181818;stroke-width:3.125;"/></g><!--link S2 to S3--><g class="link" data-entity-1="ent0003" data-entity-2="ent0004" data-link-type="dependency" data-source-line="19" id="lnk11"><path d="M328,480.9687 C328,535.2812 328,593.3438 328,647.625" fill="none" id="S2-to-S3" style="stroke:#181818;stroke-width:3.125;"/><polygon fill="#181818" points="328,666.375,340