<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ETHSKILLS — Feedback Inbox</title>
<style>
:root {
  --bg: #1a1208;
  --fg: #e8d5b0;
  --dim: #8a7a5f;
  --accent: #ffb000;
  --praise: #6ec27a;
  --border: #2e2410;
  --hover: #251c0c;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  color: var(--fg);
  font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Menlo', 'Consolas', monospace;
  font-size: 14px;
  line-height: 1.6;
  max-width: 860px;
  margin: 0 auto;
  padding: 3rem 1.5rem;
}
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

h1 { color: var(--accent); font-size: 18px; font-weight: 600; margin-bottom: 0.25rem; }
.subtitle { color: var(--dim); font-size: 13px; margin-bottom: 2rem; }

/* Auth */
#auth { max-width: 400px; }
#auth label { color: var(--dim); font-size: 12px; text-transform: uppercase; letter-spacing: 2px; display: block; margin-bottom: 0.5rem; }
#auth input {
  width: 100%;
  background: var(--hover);
  border: 1px solid var(--border);
  color: var(--fg);
  font-family: inherit;
  font-size: 14px;
  padding: 0.5rem 0.75rem;
  border-radius: 3px;
  margin-bottom: 0.75rem;
  outline: none;
}
#auth input:focus { border-color: var(--accent); }
#auth button {
  background: transparent;
  border: 1px solid var(--accent);
  color: var(--accent);
  font-family: inherit;
  font-size: 14px;
  padding: 0.5rem 1.25rem;
  border-radius: 3px;
  cursor: pointer;
}
#auth button:hover { background: var(--hover); }
.auth-error { color: #c94a4a; font-size: 13px; margin-top: 0.5rem; display: none; }

/* Inbox */
#inbox { display: none; }

.toolbar {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  margin-bottom: 1.5rem;
  flex-wrap: wrap;
}
.filter-btns { display: flex; gap: 0; }
.filter-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--dim);
  font-family: inherit;
  font-size: 12px;
  padding: 0.3rem 0.85rem;
  cursor: pointer;
}
.filter-btn:first-child { border-radius: 3px 0 0 3px; }
.filter-btn:not(:first-child) { border-left: none; }
.filter-btn:last-child { border-radius: 0 3px 3px 0; }
.filter-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(255,176,0,0.06); }
.filter-btn:hover:not(.active) { color: var(--fg); border-color: var(--dim); }

.unread-badge {
  background: var(--accent);
  color: var(--bg);
  font-size: 11px;
  font-weight: 700;
  padding: 0.1rem 0.45rem;
  border-radius: 10px;
  margin-left: 0.3rem;
}

.spacer { flex: 1; }
.count { color: var(--dim); font-size: 13px; }
.btn-small {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--dim);
  font-family: inherit;
  font-size: 12px;
  padding: 0.3rem 0.75rem;
  border-radius: 3px;
  cursor: pointer;
}
.btn-small:hover { border-color: var(--accent); color: var(--accent); }

/* Entries */
.entry {
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 1rem 1.25rem;
  margin-bottom: 1rem;
  background: var(--hover);
  transition: opacity 0.15s;
}
.entry.is-read { opacity: 0.5; }
.entry.is-read:hover { opacity: 0.8; }

.entry-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 1rem;
  margin-bottom: 0.75rem;
}
.entry-meta { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
.entry-ts { color: var(--dim); font-size: 12px; }
.unread-dot {
  width: 7px; height: 7px;
  background: var(--accent);
  border-radius: 50%;
  flex-shrink: 0;
}
.entry-skill {
  color: var(--accent);
  font-size: 12px;
  background: rgba(255,176,0,0.08);
  border: 1px solid rgba(255,176,0,0.2);
  padding: 0.1rem 0.5rem;
  border-radius: 3px;
}
.entry-kind {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 0.1rem 0.5rem;
  border-radius: 3px;
}
.entry-kind.kind-issue {
  color: var(--accent);
  background: rgba(255,176,0,0.08);
  border: 1px solid rgba(255,176,0,0.25);
}
.entry-kind.kind-praise {
  color: var(--praise);
  background: rgba(110,194,122,0.08);
  border: 1px solid rgba(110,194,122,0.3);
}
.entry.kind-praise { border-left: 3px solid var(--praise); }
.entry-agent { color: var(--dim); font-size: 12px; }

.entry-problem { color: var(--fg); font-size: 14px; margin-bottom: 0.5rem; line-height: 1.6; }
.entry-context {
  color: var(--dim);
  font-size: 13px;
  border-left: 2px solid var(--border);
  padding-left: 0.75rem;
  margin-top: 0.5rem;
}

.mark-read-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--dim);
  font-family: inherit;
  font-size: 11px;
  padding: 0.2rem 0.6rem;
  border-radius: 3px;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
}
.mark-read-btn:hover { border-color: var(--accent); color: var(--accent); }
.is-read .mark-read-btn { display: none; }

.empty { color: var(--dim); font-size: 14px; padding: 2rem 0; }

.footer {
  color: var(--dim);
  font-size: 12px;
  margin-top: 3rem;
  padding-top: 1rem;
  border-top: 1px solid var(--border);
}
</style>
</head>
<body>

<h1>ETHSKILLS / Feedback Inbox</h1>
<p class="subtitle"><a href="/">← ethskills.com</a></p>

<div id="auth">
  <label for="secret-input">Secret</label>
  <input type="password" id="secret-input" placeholder="Enter your FEEDBACK_SECRET" autocomplete="off">
  <button id="auth-btn">Open Inbox</button>
  <p class="auth-error" id="auth-error">Wrong secret or server error.</p>
</div>

<div id="inbox">
  <div class="toolbar">
    <div class="filter-btns">
      <button class="filter-btn active" data-filter="unread" id="filter-unread">
        Unread<span class="unread-badge" id="unread-count" style="display:none"></span>
      </button>
      <button class="filter-btn" data-filter="issue">Issues</button>
      <button class="filter-btn" data-filter="praise">Praise</button>
      <button class="filter-btn" data-filter="all">All</button>
    </div>
    <span class="spacer"></span>
    <span class="count" id="count"></span>
    <button class="btn-small" id="mark-all-btn">Mark all read</button>
    <button class="btn-small" id="refresh-btn">↻ Refresh</button>
    <button class="btn-small" id="logout-btn">Sign out</button>
  </div>
  <div id="entries"></div>
</div>

<div class="footer"><a href="/">ethskills.com</a></div>

<script>
const SECRET_KEY = 'ethskills_feedback_secret';
let allEntries = [];
let currentFilter = 'unread';
let secret = '';

function formatDate(iso) {
  return new Date(iso).toLocaleString(undefined, { dateStyle: 'medium', timeStyle: 'short' });
}
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function loadFeedback() {
  const res = await fetch(`/api/feedback?secret=${encodeURIComponent(secret)}`);
  if (res.status === 401) throw new Error('unauthorized');
  if (!res.ok) throw new Error('server error');
  return res.json();
}

async function markRead(id) {
  await fetch(`/api/feedback?action=read&secret=${encodeURIComponent(secret)}&id=${encodeURIComponent(id)}`, {
    method: 'POST',
  });
  const entry = allEntries.find(e => e.id === id);
  if (entry) entry.read = true;
  renderEntries();
}

async function markAllRead() {
  const unread = allEntries.filter(e => !e.read);
  await Promise.all(unread.map(e => markRead(e.id)));
}

function kindOf(entry) {
  return entry.kind === 'praise' ? 'praise' : 'issue';
}

function renderEntries() {
  const el = document.getElementById('entries');
  const countEl = document.getElementById('count');
  const unreadCountEl = document.getElementById('unread-count');

  const unread = allEntries.filter(e => !e.read);
  let visible;
  let label;
  if (currentFilter === 'unread') {
    visible = unread;
    label = 'unread';
  } else if (currentFilter === 'issue') {
    visible = allEntries.filter(e => kindOf(e) === 'issue');
    label = `issue${visible.length === 1 ? '' : 's'}`;
  } else if (currentFilter === 'praise') {
    visible = allEntries.filter(e => kindOf(e) === 'praise');
    label = visible.length === 1 ? 'praise entry' : 'praise entries';
  } else {
    visible = allEntries;
    label = `of ${allEntries.length}`;
  }

  // Update unread badge
  if (unread.length > 0) {
    unreadCountEl.textContent = unread.length;
    unreadCountEl.style.display = '';
  } else {
    unreadCountEl.style.display = 'none';
  }

  countEl.textContent = `${visible.length} ${label}`;

  if (!visible.length) {
    const empty = currentFilter === 'unread' ? 'All caught up.'
      : currentFilter === 'praise' ? 'No praise yet.'
      : currentFilter === 'issue' ? 'No issues.'
      : 'No feedback yet.';
    el.innerHTML = `<p class="empty">${empty}</p>`;
    return;
  }

  el.innerHTML = visible.map(e => {
    const k = kindOf(e);
    return `
    <div class="entry kind-${k} ${e.read ? 'is-read' : ''}" data-id="${esc(e.id)}">
      <div class="entry-header">
        <div class="entry-meta">
          ${!e.read ? '<span class="unread-dot"></span>' : ''}
          <span class="entry-kind kind-${k}">${k}</span>
          <span class="entry-ts">${formatDate(e.ts)}</span>
          ${e.skill ? `<span class="entry-skill">${esc(e.skill)}</span>` : ''}
          ${e.agent ? `<span class="entry-agent">${esc(e.agent)}</span>` : ''}
        </div>
        <button class="mark-read-btn" data-id="${esc(e.id)}">Mark read</button>
      </div>
      <div class="entry-problem">${esc(e.message ?? e.problem)}</div>
      ${e.context ? `<div class="entry-context">${esc(e.context)}</div>` : ''}
    </div>`;
  }).join('');

  el.querySelectorAll('.mark-read-btn').forEach(btn => {
    btn.addEventListener('click', e => { e.stopPropagation(); markRead(btn.dataset.id); });
  });
}

async function openInbox(s) {
  secret = s;
  const data = await loadFeedback();
  localStorage.setItem(SECRET_KEY, s);
  allEntries = data.entries;
  document.getElementById('auth').style.display = 'none';
  document.getElementById('inbox').style.display = 'block';
  renderEntries();
}

// Auth
document.getElementById('auth-btn').addEventListener('click', async () => {
  const s = document.getElementById('secret-input').value.trim();
  if (!s) return;
  try { await openInbox(s); }
  catch { document.getElementById('auth-error').style.display = 'block'; }
});
document.getElementById('secret-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('auth-btn').click();
});

// Filter
document.querySelectorAll('.filter-btn[data-filter]').forEach(btn => {
  btn.addEventListener('click', () => {
    currentFilter = btn.dataset.filter;
    document.querySelectorAll('.filter-btn[data-filter]').forEach(b => {
      b.classList.toggle('active', b.dataset.filter === currentFilter);
    });
    renderEntries();
  });
});

// Actions
document.getElementById('refresh-btn').addEventListener('click', async () => {
  const data = await loadFeedback();
  allEntries = data.entries;
  renderEntries();
});
document.getElementById('mark-all-btn').addEventListener('click', markAllRead);
document.getElementById('logout-btn').addEventListener('click', () => {
  localStorage.removeItem(SECRET_KEY);
  secret = '';
  allEntries = [];
  document.getElementById('inbox').style.display = 'none';
  document.getElementById('auth').style.display = 'block';
  document.getElementById('secret-input').value = '';
});

// Auto-login
const stored = localStorage.getItem(SECRET_KEY);
if (stored) openInbox(stored).catch(() => localStorage.removeItem(SECRET_KEY));
</script>
</body>
</html>
